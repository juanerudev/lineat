document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-e095-4152-ac28-bd8605bd8ffb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"e5d3ae9e-0ea1-4231-906c-26216716d52d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"5c6e9094-82fd-40ae-a4c6-57184c2659f6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --paper:#f6f3ec;\n    --surface:#fffdf8;\n    --ink:#26241f;\n    --ink-2:#5d584d;\n    --ink-3:#938c7d;\n    --line:#e7e1d4;\n    --line-2:#d9d2c2;\n    --accent:#1c7d74;\n    --accent-2:#155f58;\n    --accent-soft:#dcefe9;\n    --accent-tint:#eef8f4;\n    --sym:#b8552f;\n    --sym-soft:#f6e4d8;\n    --sym-tint:#fbf0e8;\n    --shadow:0 1px 2px rgba(38,36,31,.05), 0 8px 30px rgba(38,36,31,.07);\n    --ui:'Hanken Grotesk', system-ui, sans-serif;\n    --serif:'Newsreader', Georgia, serif;\n  }\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{\n    background:var(--paper);\n    color:var(--ink);\n    font-family:var(--ui);\n    font-size:16px;\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n  }\n  button{font-family:inherit;cursor:pointer;}\n  ::selection{background:var(--accent-soft);}\n\n  .app{max-width:760px;margin:0 auto;padding:34px 22px 90px;}\n\n  /* ---- top bar ---- */\n  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:12px;}\n  .brand{display:flex;align-items:baseline;gap:11px;cursor:pointer;}\n  .brand .mark{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.5px;line-height:1;}\n  .brand .mark b{color:var(--accent);font-weight:600;}\n  .brand .sub{font-size:12.5px;color:var(--ink-3);letter-spacing:.3px;}\n  .nav-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}\n  .navbtn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-size:14px;font-weight:600;padding:8px 14px;border-radius:10px;transition:.15s;}\n  .navbtn:hover{border-color:var(--accent);color:var(--accent);}\n  .navbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}\n  .navbtn svg{width:16px;height:16px;}\n\n  /* ---- generic surface ---- */\n  .card{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;box-shadow:var(--shadow);}\n\n  .view{display:none;}\n  .view.active{display:block;}\n  .view.entering{animation:rise .35s cubic-bezier(.2,.7,.3,1);}\n  @media (prefers-reduced-motion:reduce){ .view.entering{animation:none;} }\n  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}\n\n  /* ============ CALENDAR ============ */\n  .cal-top{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1.5px solid var(--line);}\n  .cal-month{font-family:var(--serif);font-size:24px;font-weight:500;letter-spacing:-.3px;text-transform:capitalize;}\n  .cal-month span{color:var(--ink-3);font-weight:400;margin-left:6px;}\n  .stepper{display:flex;gap:4px;}\n  .step{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--line-2);background:var(--surface);color:var(--ink-2);display:grid;place-items:center;transition:.15s;}\n  .step:hover{border-color:var(--accent);color:var(--accent);}\n  .today-btn{font-size:13px;font-weight:600;color:var(--ink-2);border:1.5px solid var(--line-2);background:var(--surface);padding:0 12px;border-radius:10px;transition:.15s;}\n  .today-btn:hover{border-color:var(--accent);color:var(--accent);}\n\n  .dow{display:grid;grid-template-columns:repeat(7,1fr);padding:14px 20px 4px;}\n  .dow span{text-align:center;font-size:11.5px;font-weight:700;letter-spacing:.6px;color:var(--ink-3);text-transform:uppercase;}\n  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;padding:6px 20px 22px;}\n  .cell{position:relative;aspect-ratio:1/.96;border:1.5px solid var(--line);border-radius:12px;background:var(--surface);padding:9px 10px;text-align:left;font-family:var(--ui);font-size:15px;font-weight:600;color:var(--ink);transition:.13s;display:flex;flex-direction:column;}\n  .cell:hover{border-color:var(--accent);background:var(--accent-tint);transform:translateY(-1px);}\n  .cell.out{visibility:hidden;}\n  .cell.today{border-color:var(--ink);border-width:2px;}\n  .cell.future{color:var(--ink-3);}\n  .cell .cnt{margin-top:auto;font-size:11px;font-weight:600;color:var(--ink-3);}\n  .cell .dots{position:absolute;left:10px;bottom:9px;display:flex;gap:3px;}\n  .cell .dots i{width:6px;height:6px;border-radius:50%;background:var(--accent);}\n  .cell.today .lbl{position:absolute;top:7px;right:9px;font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--ink-3);text-transform:uppercase;}\n\n  .legend{display:flex;gap:14px 18px;align-items:center;flex-wrap:wrap;padding:0 24px 20px;font-size:12.5px;color:var(--ink-3);}\n  .legend b{display:inline-flex;align-items:center;gap:6px;font-weight:500;color:var(--ink-2);}\n  .legend .d{width:8px;height:8px;border-radius:50%;background:var(--accent);}\n\n  /* ============ DAY ============ */\n  .day-top{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1.5px solid var(--line);}\n  .back{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:var(--ink-2);background:none;border:none;padding:0;}\n  .back:hover{color:var(--accent);}\n  .day-title{font-family:var(--serif);font-size:22px;font-weight:500;text-transform:capitalize;text-align:right;}\n  .day-title small{display:block;font-family:var(--ui);font-size:12px;font-weight:600;color:var(--ink-3);text-transform:none;letter-spacing:.3px;}\n  .day-step{display:flex;gap:4px;}\n\n  .entries{padding:10px 24px 4px;min-height:90px;}\n  .empty{padding:34px 8px;text-align:center;color:var(--ink-3);font-family:var(--serif);font-style:italic;font-size:17px;}\n\n  .gap{display:flex;align-items:center;gap:10px;padding:3px 0 3px 64px;}\n  .gap .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent-2);background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:20px;padding:2px 11px;white-space:nowrap;}\n  .gap .pill svg{width:12px;height:12px;}\n\n  .row{display:flex;gap:14px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);position:relative;}\n  .row:last-child{border-bottom:none;}\n  .row .time{flex:0 0 50px;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);padding-top:3px;cursor:text;border-radius:6px;}\n  .row .time:hover{background:var(--accent-tint);}\n  .row .time input{width:62px;font-family:var(--ui);font-size:14px;font-weight:700;border:1.5px solid var(--accent);border-radius:6px;padding:1px 4px;}\n  .row .kind{flex:0 0 22px;margin-top:1px;position:relative;}\n  .row .kind button{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line-2);background:var(--surface);display:grid;place-items:center;font-size:11px;color:var(--ink-3);padding:0;transition:.13s;line-height:1;}\n  .row .body{flex:1;min-width:0;}\n  .row .txt{font-family:var(--serif);font-size:18px;line-height:1.4;color:var(--ink);outline:none;border-radius:6px;padding:1px 4px;margin-left:-4px;word-break:break-word;}\n  .row .txt:focus{background:v ng:20px 24px;border-bottom:1.5px solid var(--line);}\n  .modal-head h2{font-family:var(--serif);font-size:22px;font-weight:500;margin:0;}\n  .modal-head .mh-sub{font-size:12.5px;color:var(--ink-3);margin-top:2px;}\n  .modal-x{border:none;background:none;font-size:24px;color:var(--ink-3);line-height:1;padding:4px 8px;border-radius:8px;}\n  .modal-x:hover{color:var(--sym);background:var(--sym-tint);}\n  .modal-body{padding:18px 24px 24px;}\n  .catlist{display:flex;flex-direction:column;gap:10px;}\n  .catedit{display:flex;flex-direction:column;gap:11px;border:1.5px solid var(--line);border-radius:13px;padding:13px;background:#fbf9f3;}\n  .catedit .top{display:flex;align-items:center;gap:10px;}\n  .catedit .emoji-in{width:46px;height:46px;text-align:center;font-size:20px;border:1.5px solid var(--line-2);border-radius:11px;background:var(--surface);flex:0 0 auto;padding:0;}\n  .catedit .emoji-in:focus{outline:none;border-color:var(--accent);}\n  .catedit .name-in{flex:1;min-width:0;font-family:var(--ui);font-size:15.5px;font-weight:600;border:1.5px solid var(--line-2);border-radius:11px;padding:11px 12px;background:var(--surface);color:var(--ink);}\n  .catedit .name-in:focus{outline:none;border-color:var(--accent);}\n  .catedit .rm{border:none;background:none;color:var(--ink-3);font-size:20px;line-height:1;padding:8px;border-radius:9px;flex:0 0 auto;}\n  .catedit .rm:hover{color:var(--sym);background:var(--sym-tint);}\n  .swatches{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}\n  .swatch{width:24px;height:24px;border-radius:8px;border:2px solid transparent;cursor:pointer;padding:0;transition:.12s;}\n  .swatch:hover{transform:scale(1.08);}\n  .swatch.on{border-color:var(--ink);}\n  .catedit.confirm{border-color:var(--sym);background:var(--sym-tint);}\n  .catedit .warn{font-size:13px;color:#7a3a1f;line-height:1.45;}\n  .catedit .warn b{font-weight:700;}\n  .catedit .crow{display:flex;gap:8px;flex-wrap:wrap;}\n  .catedit .crow .btn{padding:8px 14px;font-size:13.5px;margin:0;}\n  .catedit .crow .btn.sym{background:var(--sym);border-color:var(--sym);color:#fff;}\n  .catedit .crow .btn.sym:hover{background:#9a4526;border-color:#9a4526;}\n  .catedit .crow .btn.cancel{background:var(--surface);border-color:var(--line-2);color:var(--ink-2);}\n  .modal .addcat{margin-top:14px;justify-content:center;width:100%;}\n  .modal-foot{font-size:12.5px;color:var(--ink-3);margin:16px 0 0;text-align:center;line-height:1.5;}\n\n  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:11px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:80;}\n  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}\n\n  @media (max-width:560px){\n    .app{padding:22px 14px 80px;}\n    .grid,.dow{padding-left:12px;padding-right:12px;}\n    .cell{font-size:13px;border-radius:9px;}\n    .row .txt{font-size:16px;}\n    .day-summary .s{min-width:90px;}\n  }\n\n  @media print{\n    body{background:#fff;}\n    .topbar,.controls,.quick,.picks,.filter-head,.catfilter,.actions,.rep-top .navbtn,.no-print{display:none !important;}\n    .card{border:none;box-shadow:none;}\n    .app{max-width:100%;padding:0;}\n    .report-block{break-inside:avoid;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"app\">\n    <div class=\"topbar\">\n      <div class=\"brand\" id=\"brandHome\" data-screen-label=\"lineat\">\n        <div class=\"mark\">line<b>at<\u002Fb><\u002Fdiv>\n        <div class=\"sub\">diario por categorías<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"nav-actions\">\n        <button class=\"navbtn\" id=\"goCalendar\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"17\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg>\n          Calendario\n        <\u002Fbutton>\n        <button class=\"navbtn\" id=\"goCats\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 7l9-4 9 4-9 4-9-4z\"><\u002Fpath><path d=\"M3 12l9 4 9-4M3 17l9 4 9-4\"><\u002Fpath><\u002Fsvg>\n          Categorías\n        <\u002Fbutton>\n        <button class=\"navbtn\" id=\"goReports\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 20V10M10 20V4M16 20v-7M22 20H2\"><\u002Fpath><\u002Fsvg>\n          Reportes\n        <\u002Fbutton>\n        <button class=\"navbtn\" id=\"goData\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><ellipse cx=\"12\" cy=\"6\" rx=\"8\" ry=\"3\"><\u002Fellipse><path d=\"M4 6v6c0 1.66 3.58 3 8 3s8-1.34 8-3V6M4 12v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6\"><\u002Fpath><\u002Fsvg>\n          Datos\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CALENDAR -->\n    <section class=\"view card active\" id=\"view-calendar\" data-screen-label=\"Calendario\">\n      <div class=\"cal-top\">\n        <div class=\"cal-month\" id=\"calMonth\">Junio <span>2026<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:8px;align-items:center;\">\n          <button class=\"today-btn\" id=\"calToday\">Hoy<\u002Fbutton>\n          <div class=\"stepper\">\n            <button class=\"step\" id=\"calPrev\" aria-label=\"Mes anterior\">‹<\u002Fbutton>\n            <button class=\"step\" id=\"calNext\" aria-label=\"Mes siguiente\">›<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dow\"><span>Lun<\u002Fspan><span>Mar<\u002Fspan><span>Mié<\u002Fspan><span>Jue<\u002Fspan><span>Vie<\u002Fspan><span>Sáb<\u002Fspan><span>Dom<\u002Fspan><\u002Fdiv>\n      <div class=\"grid\" id=\"calGrid\"><\u002Fdiv>\n      <div class=\"legend\" id=\"calLegend\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- DAY -->\n    <section class=\"view card\" id=\"view-day\" data-screen-label=\"Día\">\n      <div class=\"day-top\">\n        <button class=\"back\" id=\"dayBack\">\n          <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n          Calendario\n        <\u002Fbutton>\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <div class=\"day-title\" id=\"dayTitle\">—<\u002Fdiv>\n          <div class=\"day-step stepper\">\n            <button class=\"step\" id=\"dayPrev\" aria-label=\"Día anterior\">‹<\u002Fbutton>\n            <button class=\"step\" id=\"dayNext\" aria-label=\"Día siguiente\">›<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"entries\" id=\"dayEntries\"><\u002Fdiv>\n      <div class=\"add\">\n        <div class=\"catbar\" id=\"addCats\"><\u002Fdiv>\n        <div class=\"addmain\">\n          <input type=\"time\" id=\"addTime\">\n          <input class=\"ti\" id=\"addText\" placeholder=\"¿Qué quieres registrar?\" autocomplete=\"off\">\n          <button class=\"go\" id=\"addGo\" disabled=\"\">+<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"day-summary\" id=\"daySummary\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- REPORTS -->\n    <section class=\"view card\" id=\"view-reports\" data-screen-label=\"Reportes\">\n      <div class=\"rep-top\">\n        <h2>Reportes &amp; exportación<\u002Fh2>\n        <button class=\"back\" id=\"repBack\">\n          <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n          Calendario\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"rep-body\">\n        <div class=\"controls\">\n          <div class=\"ctrl\"><label>Desde<\u002Flabel><input type=\"date\" id=\"repFrom\"><\u002Fdiv>\n          <div class=\"ctrl\"><label>Hasta<\u002Flabel><input type=\"date\" id=\"repTo\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"quick\" id=\"repQuick\">\n          <button data-q=\"7\">Últimos 7 días<\u002Fbutton>\n          <button data-q=\"14\">14 días<\u002Fbutton>\n          <button data-q=\"30\">30 días<\u002Fbutton>\n          <button data-q=\"month\">Este mes<\u002Fbutton>\n          <button data-q=\"all\">Todo<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"filter-head\">\n          <span class=\"lbl\">Categorías a incluir<\u002Fspan>\n          <div class=\"filter-tools\">\n            <button id=\"repCatsAll\">Todas<\u002Fbutton>\n            <button id=\"repCatsNone\">Ninguna<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"catfilter\" id=\"repCats\"><\u002Fdiv>\n\n        <div class=\"filter-head\"><span class=\"lbl\">Secciones del reporte<\u002Fspan><\u002Fdiv>\n        <div class=\"picks\" id=\"repPicks\">\n          <label class=\"pick on\" data-r=\"intervals\"><span class=\"cb\">✓<\u002Fspan> Estadísticas de intervalos<\u002Flabel>\n          <label class=\"pick on\" data-r=\"log\"><span class=\"cb\">✓<\u002Fspan> Bitácora cronológica<\u002Flabel>\n          <label class=\"pick on\" data-r=\"schedule\"><span class=\"cb\">✓<\u002Fspan> Regularidad de horarios<\u002Flabel>\n          <label class=\"pick on\" data-r=\"consult\"><span class=\"cb\">✓<\u002Fspan> Resumen para consulta<\u002Flabel>\n        <\u002Fdiv>\n\n        <div class=\"actions\">\n          <button class=\"btn\" id=\"repGen\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n            Generar reporte\n          <\u002Fbutton>\n          <button class=\"btn ghost\" id=\"repCsv\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 3v12m0 0l-4-4m4 4l4-4M4 21h16\"><\u002Fpath><\u002Fsvg>\n            Descargar CSV\n          <\u002Fbutton>\n          <button class=\"btn ghost\" id=\"repPrint\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2M6 14h12v7H6z\"><\u002Fpath><\u002Fsvg>\n            Imprimir / PDF\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"out\" id=\"repOut\">\n          <div class=\"hint\">Elige un rango y las categorías, luego pulsa «Generar reporte» para ver el resumen aquí.<br>Descarga el CSV en cualquier momento para tus análisis en Excel.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- DATA / BACKUP -->\n    <section class=\"view card\" id=\"view-data\" data-screen-label=\"Datos\">\n      <div class=\"rep-top\">\n        <h2>Respaldo &amp; restauración<\u002Fh2>\n        <button class=\"back\" id=\"dataBack\">\n          <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n          Calendario\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"rep-body\">\n        <p class=\"desc\" style=\"margin-top:0;font-size:14px;color:var(--ink-2)\">Tus registros viven en este navegador. Descarga un respaldo para guardarlos a salvo o moverlos a otro equipo, y restáuralo cuando quieras. El respaldo incluye también tus categorías.<\u002Fp>\n\n        <div class=\"statgrid\" style=\"margin:18px 0 24px\">\n          <div class=\"statbox\"><div class=\"k\">Días con registro<\u002Fdiv><div class=\"v\" id=\"dataDays\">0<\u002Fdiv><\u002Fdiv>\n          <div class=\"statbox\"><div class=\"k\">Registros totales<\u002Fdiv><div class=\"v\" id=\"dataEntries\">0<\u002Fdiv><\u002Fdiv>\n          <div class=\"statbox\"><div class=\"k\">Categorías<\u002Fdiv><div class=\"v\" id=\"dataCats\">0<\u002Fdiv><\u002Fdiv>\n          <div class=\"statbox\"><div class=\"k\">Rango guardado<\u002Fdiv><div class=\"v\" id=\"dataSpan\" style=\"font-size:18px\">—<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"data-panels\">\n          <div class=\"data-panel\">\n            <div class=\"dp-head\"><span class=\"ic\">⬇<\u002Fspan><div><h3>Descargar respaldo<\u002Fh3><p>Un archivo <b>.json<\u002Fb> con todos tus registros y categorías. Guárdalo en tu nube o disco.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <button class=\"btn\" id=\"dataExport\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 3v12m0 0l-4-4m4 4l4-4M4 21h16\"><\u002Fpath><\u002Fsvg>\n              Descargar respaldo (.json)\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <div class=\"data-panel\">\n            <div class=\"dp-head\"><span class=\"ic\">⬆<\u002Fspan><div><h3>Restaurar desde archivo<\u002Fh3><p>Carga un respaldo <b>.json<\u002Fb>. Podrás <b>combinar<\u002Fb> con lo actual o <b>reemplazar<\u002Fb> todo.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <button class=\"btn ghost\" id=\"dataImportBtn\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 21V9m0 0l-4 4m4-4l4 4M4 3h16\"><\u002Fpath><\u002Fsvg>\n              Elegir archivo de respaldo…\n            <\u002Fbutton>\n            <input type=\"file\" id=\"dataImportFile\" accept=\".json,application/json\" hidden=\"\">\n            <div id=\"dataRestorePanel\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p class=\"dp-foot\">El respaldo es solo tuyo y nunca sale de tu dispositivo salvo que tú lo compartas. Tip: descarga un respaldo cada cierto tiempo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <!-- CATEGORY MANAGER MODAL -->\n  <div class=\"modal-back\" id=\"catModal\">\n    <div class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Gestionar categorías\">\n      <div class=\"modal-head\">\n        <div>\n          <h2>Categorías<\u002Fh2>\n          <div class=\"mh-sub\">Crea y organiza qué puedes registrar<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"modal-x\" id=\"catModalX\" aria-label=\"Cerrar\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"modal-body\">\n        <div class=\"catlist\" id=\"catList\"><\u002Fdiv>\n        <button class=\"btn ghost addcat\" id=\"catAdd\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n          Añadir categoría\n        <\u002Fbutton>\n        <p class=\"modal-foot\">Elige un ícono (emoji), un nombre y un color para cada categoría. Al eliminar una con registros, podrás moverlos a otra.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n  \n\n<script>\n/* ===================== lineat · app logic (por categorías) ===================== */\n(function () {\n  'use strict';\n\n  var STORE = 'lineat.entries.v2';\n  var STORE_CATS = 'lineat.categories.v1';\n  var MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];\n  var DAYS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];\n  var DAYS_SH = ['dom','lun','mar','mié','jue','vie','sáb'];\n\n  /* curated palette — earthy tones matching the paper aesthetic */\n  var PALETTE = {\n    teal:   {s:'#1c7d74', t:'#eef8f4', o:'#dcefe9', d:'#155f58'},\n    orange: {s:'#b8552f', t:'#fbf0e8', o:'#f6e4d8', d:'#8f3f20'},\n    indigo: {s:'#4b5d8f', t:'#eef0f8', o:'#dde2f0', d:'#3a4a76'},\n    plum:   {s:'#7a4a78', t:'#f5eef4', o:'#e9dce7', d:'#5f385d'},\n    olive:  {s:'#6f7437', t:'#f2f3e4', o:'#e4e6cb', d:'#565a27'},\n    amber:  {s:'#a9762a', t:'#f9f1e1', o:'#f0e1c5', d:'#855b1c'},\n    rose:   {s:'#a8466a', t:'#f9eef2', o:'#f0d9e1', d:'#86304f'},\n    slate:  {s:'#4f5b62', t:'#eef1f3', o:'#dde3e6', d:'#3b454b'}\n  };\n  var PAL_ORDER = ['teal','orange','indigo','plum','olive','amber','rose','slate'];\n\n  function defaultCats(){\n    return [\n      {id:'food', name:'Comida', icon:'🍽', color:'teal'},\n      {id:'symptom', name:'Síntoma / ánimo', icon:'✱', color:'orange'}\n    ];\n  }\n\n  /* ---------- helpers ---------- */\n  function pad(n){ return (n<10?'0':'')+n; }\n  function keyOf(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }\n  function parseKey(k){ var p=k.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }\n  function nowHM(){ var d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }\n  function minOf(hm){ var p=hm.split(':'); return (+p[0])*60+(+p[1]); }\n  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }\n  function fmtGap(m){\n    if(m<0) m=0;\n    var h=Math.floor(m/60), mm=m%60;\n    if(h===0) return mm+' min';\n    if(mm===0) return h+' h';\n    return h+' h '+mm+' min';\n  }\n  function fmtGapShort(m){ var h=Math.floor(m/60), mm=m%60; return (h>0? h+'h ':'')+pad(mm)+'m'; }\n  function titleCase(s){ return s.charAt(0).toUpperCase()+s.slice(1); }\n  function dayLabel(d){ return titleCase(DAYS[d.getDay()])+', '+d.getDate()+' de '+MONTHS[d.getMonth()]; }\n  function dayLabelShort(d){ return DAYS_SH[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()].slice(0,3); }\n  function escapeHtml(s){ return String(s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c];}); }\n\n  /* ---------- state ---------- */\n  var data = load();\n  var cats = loadCats();\n  migrateEntries();\n  var calY, calM;                 // visible month\n  var curKey = keyOf(new Date()); // selected day\n  var addCat = cats[0] ? cats[0].id : 'food';\n  var pendingDelete = null;       // category id awaiting delete confirm\n\n  function load(){\n    try{ var raw=localStorage.getItem(STORE); if(raw) return JSON.parse(raw); }catch(e){}\n    return {};\n  }\n  function save(){ try{ localStorage.setItem(STORE, JSON.stringify(data)); }catch(e){} }\n  function loadCats(){\n    try{ var raw=localStorage.getItem(STORE_CATS); if(raw){ var c=JSON.parse(raw); if(Array.isArray(c)&&c.length) return c; } }catch(e){}\n    var d=defaultCats(); try{ localStorage.setItem(STORE_CATS, JSON.stringify(d)); }catch(e){} return d;\n  }\n  function saveCats(){ try{ localStorage.setItem(STORE_CATS, JSON.stringify(cats)); }catch(e){} }\n\n  function migrateEntries(){\n    var changed=false;\n    Object.keys(data).forEach(function(k){\n      (data[k]||[]).forEach(function(e){\n        if(!e.cat){ e.cat = (e.type==='symptom') ? 'symptom' : (e.type || 'food'); changed=true; }\n      });\n    });\n    if(changed) save();\n    ensureCatsExist();\n  }\n  // make sure any category id referenced by an entry actually exists\n  function ensureCatsExist(){\n    var have={}; cats.forEach(function(c){ have[c.id]=1; });\n    var missing={}, added=false, n=0;\n    Object.keys(data).forEach(function(k){\n      (data[k]||[]).forEach(function(e){ if(e.cat && !have[e.cat]) missing[e.cat]=1; });\n    });\n    Object.keys(missing).forEach(function(id){\n      cats.push({ id:id, name:titleCase(id), icon:'•', color:PAL_ORDER[(cats.length+n)%PAL_ORDER.length] });\n      have[id]=1; added=true; n++;\n    });\n    if(added) saveCats();\n  }\n\n  function getCat(id){\n    for(var i=0;i<cats.length;i++) if(cats[i].id===id) return cats[i];\n    return {id:id||'?', name:'(sin categoría)', icon:'•', color:'slate'};\n  }\n  function pal(color){ return PALETTE[color] || PALETTE.slate; }\n  function catColors(id){ return pal(getCat(id).color); }\n  function nextColor(){\n    var used={}; cats.forEach(function(c){ used[c.color]=1; });\n    for(var i=0;i<PAL_ORDER.length;i++){ if(!used[PAL_ORDER[i]]) return PAL_ORDER[i]; }\n    return PAL_ORDER[cats.length % PAL_ORDER.length];\n  }\n\n  function entriesFor(k){\n    var a=(data[k]||[]).slice();\n    a.sort(function(x,y){ return minOf(x.time)-minOf(y.time); });\n    return a;\n  }\n\n  /* ---------- view switching ---------- */\n  function show(name){\n    ['calendar','day','reports','data'].forEach(function(v){\n      var el=document.getElementById('view-'+v);\n      var on = (v===name);\n      el.classList.toggle('active', on);\n      if(on){ el.classList.remove('entering'); void el.offsetWidth; el.classList.add('entering'); setTimeout(function(){ el.classList.remove('entering'); }, 400); }\n    });\n    document.getElementById('goCalendar').classList.toggle('active', name==='calendar');\n    document.getElementById('goReports').classList.toggle('active', name==='reports');\n    document.getElementById('goData').classList.toggle('active', name==='data');\n    window.scrollTo(0,0);\n  }\n\n  /* ===================== CALENDAR ===================== */\n  function renderCalendar(){\n    document.getElementById('calMonth').innerHTML = titleCase(MONTHS[calM])+' <span>'+calY+'<\u002Fspan>';\n    var grid=document.getElementById('calGrid');\n    var first=new Date(calY,calM,1);\n    var startDow=(first.getDay()+6)%7; // Monday-first\n    var days=new Date(calY,calM+1,0).getDate();\n    var todayK=keyOf(new Date());\n    var html='';\n    for(var i=0;i<startDow;i++) html+='<div class=\"cell out\"><\u002Fdiv>';\n    for(var dnum=1;dnum<=days;dnum++){\n      var dt=new Date(calY,calM,dnum), k=keyOf(dt);\n      var list=data[k]||[];\n      var cls='cell';\n      if(k===todayK) cls+=' today';\n      if(parseKey(k)>parseKey(todayK)) cls+=' future';\n      // distinct categories present this day, in category order then extras\n      var present={}; list.forEach(function(e){ present[e.cat]=1; });\n      var ids=[];\n      cats.forEach(function(c){ if(present[c.id]) ids.push(c.id); });\n      Object.keys(present).forEach(function(id){ if(ids.indexOf(id)<0) ids.push(id); });\n      var dots='';\n      ids.slice(0,4).forEach(function(id){ dots+='<i style=\"background:'+catColors(id).s+'\"><\u002Fi>'; });\n      var cnt = list.length ? '<div class=\"cnt\">'+list.length+'<\u002Fdiv>' : '';\n      html+='<button class=\"'+cls+'\" data-k=\"'+k+'\">'+dnum\n          +(k===todayK?'<span class=\"lbl\">hoy<\u002Fspan>':'')\n          +cnt\n          +(dots?'<div class=\"dots\">'+dots+'<\u002Fdiv>':'')\n          +'<\u002Fbutton>';\n    }\n    grid.innerHTML=html;\n    grid.querySelectorAll('.cell[data-k]').forEach(function(c){\n      c.addEventListener('click', function(){ openDay(c.getAttribute('data-k')); });\n    });\n    // dynamic legend\n    var leg = cats.map(function(c){\n      return '<b><span class=\"d\" style=\"background:'+pal(c.color).s+'\"><\u002Fspan> '+escapeHtml(c.name)+'<\u002Fb>';\n    }).join('');\n    document.getElementById('calLegend').innerHTML = leg\n      + '<b style=\"margin-left:auto;color:var(--ink-3)\">clic en un día para escribir<\u002Fb>';\n  }\n\n  /* ===================== DAY ===================== */\n  function openDay(k){\n    curKey=k;\n    var d=parseKey(k);\n    document.getElementById('dayTitle').innerHTML =\n      titleCase(DAYS[d.getDay()])+' '+d.getDate()\n      +'<small>'+titleCase(MONTHS[d.getMonth()])+' '+d.getFullYear()+'<\u002Fsmall>';\n    var t=document.getElementById('addTime');\n    t.value = (k===keyOf(new Date())) ? nowHM() : '12:00';\n    if(!getCatExists(addCat)) addCat = cats[0] ? cats[0].id : 'food';\n    renderAddCats();\n    renderDay();\n    show('day');\n    setTimeout(function(){ document.getElementById('addText').focus(); }, 60);\n  }\n  function getCatExists(id){ for(var i=0;i<cats.length;i++) if(cats[i].id===id) return true; return false; }\n\n  function renderAddCats(){\n    var el=document.getElementById('addCats');\n    var html = cats.map(function(c){\n      var col=pal(c.color), on=(c.id===addCat);\n      var st = on ? ' style=\"background:'+col.t+';border-color:'+col.s+';color:'+col.d+'\"' : '';\n      return '<button class=\"catchip'+(on?' on':'')+'\" data-c=\"'+c.id+'\"'+st+'>'\n        +'<span class=\"em\">'+escapeHtml(c.icon)+'<\u002Fspan>'+escapeHtml(c.name)+'<\u002Fbutton>';\n    }).join('');\n    html += '<button class=\"catchip manage\" id=\"addManage\" title=\"Gestionar categorías\">＋ categorías<\u002Fbutton>';\n    el.innerHTML=html;\n    el.querySelectorAll('.catchip[data-c]').forEach(function(b){\n      b.addEventListener('click', function(){ addCat=b.getAttribute('data-c'); renderAddCats(); document.getElementById('addText').focus(); });\n    });\n    document.getElementById('addManage').addEventListener('click', openCatModal);\n  }\n\n  function renderDay(){\n    var list=entriesFor(curKey);\n    var box=document.getElementById('dayEntries');\n    if(!list.length){\n      box.innerHTML='<div class=\"empty\">Aún no hay registros este día.<br>Elige una categoría y escribe abajo lo que quieras anotar.<\u002Fdiv>';\n      renderDaySummary(list);\n      return;\n    }\n    var html='', prevByCat={};\n    list.forEach(function(e){\n      var c=getCat(e.cat), col=pal(c.color);\n      if(prevByCat[e.cat]!=null){\n        var g=minOf(e.time)-prevByCat[e.cat];\n        html+='<div class=\"gap\"><span class=\"pill\" style=\"color:'+col.d+';background:'+col.t+';border-color:'+col.o+'\">'\n          +'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"13\" r=\"8\"/><path d=\"M12 9v4l2 2M12 2h0M9 2h6\"/><\u002Fsvg>'\n          +fmtGap(g)+' · '+escapeHtml(c.name.toLowerCase())+'<\u002Fspan><\u002Fdiv>';\n      }\n      prevByCat[e.cat]=minOf(e.time);\n      var meta = '<div class=\"meta\" style=\"color:'+col.d+'\">'+escapeHtml(c.name)+'<\u002Fdiv>';\n      var kindStyle = 'border-color:'+col.s+';color:'+col.d+';background:'+col.t;\n      html+='<div class=\"row\" data-id=\"'+e.id+'\">'\n        +'<div class=\"time\" data-act=\"time\">'+e.time+'<\u002Fdiv>'\n        +'<div class=\"kind\"><button data-act=\"kind\" title=\"Cambiar categoría\" style=\"'+kindStyle+'\">'+escapeHtml(c.icon)+'<\u002Fbutton><\u002Fdiv>'\n        +'<div class=\"body\"><div class=\"txt\" data-act=\"text\" contenteditable=\"true\" spellcheck=\"false\">'+escapeHtml(e.text)+'<\u002Fdiv>'+meta+'<\u002Fdiv>'\n        +'<button class=\"del\" data-act=\"del\" title=\"Eliminar\">×<\u002Fbutton>'\n        +'<\u002Fdiv>';\n    });\n    box.innerHTML=html;\n    wireDayRows();\n    renderDaySummary(list);\n  }\n\n  function renderDaySummary(list){\n    var box=document.getElementById('daySummary');\n    if(!list.length){ box.innerHTML=''; return; }\n    // breakdown by category\n    var counts={}, order=[];\n    list.forEach(function(e){ if(counts[e.cat]==null){ counts[e.cat]=0; } counts[e.cat]++; });\n    cats.forEach(function(c){ if(counts[c.id]!=null) order.push(c.id); });\n    Object.keys(counts).forEach(function(id){ if(order.indexOf(id)<0) order.push(id); });\n    var chips = order.map(function(id){\n      var c=getCat(id), col=pal(c.color);\n      return '<span class=\"cb\" style=\"background:'+col.t+';color:'+col.d+'\"><span class=\"em\">'+escapeHtml(c.icon)+'<\u002Fspan>'+escapeHtml(c.name)+' · '+counts[id]+'<\u002Fspan>';\n    }).join('');\n    // spacing stats over all entries of the day\n    var times=list.map(function(e){return minOf(e.time);}).sort(function(a,b){return a-b;});\n    var gaps=[];\n    for(var i=1;i<times.length;i++) gaps.push(times[i]-times[i-1]);\n    var avg = gaps.length ? Math.round(gaps.reduce(function(a,b){return a+b;},0)/gaps.length) : 0;\n    var longest = gaps.length ? Math.max.apply(null,gaps) : 0;\n    var window_ = times[times.length-1]-times[0];\n    box.innerHTML =\n      '<div class=\"cat-breakdown\">'+chips+'<\u002Fdiv>'\n      +'<div class=\"s\"><div class=\"k\">Registros<\u002Fdiv><div class=\"v\">'+list.length+'<\u002Fdiv><\u002Fdiv>'\n      +'<div class=\"s\"><div class=\"k\">Intervalo medio<\u002Fdiv><div class=\"v\">'+(gaps.length?valHM(avg):'—')+'<\u002Fdiv><\u002Fdiv>'\n      +'<div class=\"s\"><div class=\"k\">Pausa más larga<\u002Fdiv><div class=\"v\">'+(gaps.length?valHM(longest):'—')+'<\u002Fdiv><\u002Fdiv>'\n      +'<div class=\"s\"><div class=\"k\">Ventana<\u002Fdiv><div class=\"v\">'+(times.length>1?valHM(window_):'—')+'<\u002Fdiv><\u002Fdiv>';\n  }\n  function valHM(m){ var h=Math.floor(m/60), mm=m%60; return h+'<small>h<\u002Fsmall> '+pad(mm)+'<small>m<\u002Fsmall>'; }\n\n  function wireDayRows(){\n    document.querySelectorAll('#dayEntries .row').forEach(function(row){\n      var id=row.getAttribute('data-id');\n      row.querySelector('[data-act=\"time\"]').addEventListener('click', function(){ editTime(row,id); });\n      row.querySelector('[data-act=\"kind\"]').addEventListener('click', function(ev){ ev.stopPropagation(); openCatMenu(row,id); });\n      row.querySelector('[data-act=\"del\"]').addEventListener('click', function(){\n        data[curKey]=(data[curKey]||[]).filter(function(x){return x.id!==id;});\n        if(!data[curKey].length) delete data[curKey];\n        save(); renderDay();\n      });\n      var tx=row.querySelector('[data-act=\"text\"]');\n      tx.addEventListener('blur', function(){\n        var e=findEntry(id); if(!e) return;\n        var v=tx.innerText.trim();\n        if(!v){ data[curKey]=(data[curKey]||[]).filter(function(x){return x.id!==id;}); if(!data[curKey].length) delete data[curKey]; save(); renderDay(); return; }\n        e.text=v; save();\n      });\n      tx.addEventListener('keydown', function(ev){ if(ev.key==='Enter'){ ev.preventDefault(); tx.blur(); } });\n    });\n  }\n  function findEntry(id){ var a=data[curKey]||[]; for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i]; return null; }\n\n  function openCatMenu(row,id){\n    var existing=row.querySelector('.catmenu');\n    document.querySelectorAll('.catmenu').forEach(function(m){ m.remove(); });\n    if(existing) return;\n    var e=findEntry(id); if(!e) return;\n    var menu=document.createElement('div'); menu.className='catmenu';\n    menu.innerHTML = cats.map(function(c){\n      var col=pal(c.color);\n      return '<button data-c=\"'+c.id+'\" class=\"'+(c.id===e.cat?'cur':'')+'\">'\n        +'<span class=\"em\" style=\"color:'+col.d+'\">'+escapeHtml(c.icon)+'<\u002Fspan>'+escapeHtml(c.name)+'<\u002Fbutton>';\n    }).join('');\n    row.querySelector('.kind').appendChild(menu);\n    menu.querySelectorAll('button[data-c]').forEach(function(b){\n      b.addEventListener('click', function(ev){ ev.stopPropagation(); e.cat=b.getAttribute('data-c'); save(); renderDay(); });\n    });\n    setTimeout(function(){\n      document.addEventListener('click', function close(){ menu.remove(); document.removeEventListener('click', close); });\n    },0);\n  }\n\n  function editTime(row,id){\n    var cell=row.querySelector('[data-act=\"time\"]');\n    var e=findEntry(id); if(!e) return;\n    var inp=document.createElement('input'); inp.type='time'; inp.value=e.time;\n    cell.innerHTML=''; cell.appendChild(inp); inp.focus();\n    function commit(){ if(inp.value){ e.time=inp.value; save(); } renderDay(); }\n    inp.addEventListener('blur', commit);\n    inp.addEventListener('keydown', function(ev){ if(ev.key==='Enter'){ inp.blur(); } });\n  }\n\n  function addEntry(){\n    var t=document.getElementById('addTime').value || nowHM();\n    var txtEl=document.getElementById('addText');\n    var v=txtEl.value.trim();\n    if(!v) return;\n    if(!getCatExists(addCat)) addCat = cats[0] ? cats[0].id : 'food';\n    if(!data[curKey]) data[curKey]=[];\n    data[curKey].push({id:uid(), time:t, cat:addCat, text:v});\n    save();\n    txtEl.value='';\n    document.getElementById('addGo').disabled=true;\n    renderDay();\n    txtEl.focus();\n  }\n\n  /* ===================== CATEGORY MANAGER ===================== */\n  function openCatModal(){ pendingDelete=null; renderCatModal(); document.getElementById('catModal').classList.add('show'); }\n  function closeCatModal(){\n    document.getElementById('catModal').classList.remove('show');\n    pendingDelete=null;\n    if(!getCatExists(addCat)) addCat = cats[0] ? cats[0].id : 'food';\n    renderCalendar();\n    if(document.getElementById('view-day').classList.contains('active')){ renderAddCats(); renderDay(); }\n    if(document.getElementById('view-reports').classList.contains('active')) renderRepCats();\n  }\n\n  function renderCatModal(){\n    var box=document.getElementById('catList');\n    box.innerHTML = cats.map(function(c){\n      var col=pal(c.color);\n      if(pendingDelete===c.id){\n        var used=countEntries(c.id);\n        var fb=cats.filter(function(x){return x.id!==c.id;})[0];\n        return '<div class=\"catedit confirm\" data-id=\"'+c.id+'\">'\n          +'<div class=\"warn\">¿Eliminar <b>'+escapeHtml(c.name)+'<\u002Fb>?'\n          + (used? ' Sus <b>'+used+'<\u002Fb> registro(s) se moverán a <b>'+escapeHtml(fb?fb.name:'—')+'<\u002Fb>.' : ' No tiene registros.')\n          +'<\u002Fdiv>'\n          +'<div class=\"crow\">'\n          +'<button class=\"btn sym\" data-act=\"confirmDel\">Eliminar<\u002Fbutton>'\n          +'<button class=\"btn cancel\" data-act=\"cancelDel\">Cancelar<\u002Fbutton>'\n          +'<\u002Fdiv><\u002Fdiv>';\n      }\n      var sw = PAL_ORDER.map(function(key){\n        return '<button class=\"swatch'+(key===c.color?' on':'')+'\" data-color=\"'+key+'\" style=\"background:'+PALETTE[key].s+'\" title=\"'+key+'\"><\u002Fbutton>';\n      }).join('');\n      return '<div class=\"catedit\" data-id=\"'+c.id+'\">'\n        +'<div class=\"top\">'\n        +'<input class=\"emoji-in\" data-act=\"icon\" value=\"'+escapeHtml(c.icon)+'\" maxlength=\"3\" aria-label=\"Ícono\">'\n        +'<input class=\"name-in\" data-act=\"name\" value=\"'+escapeHtml(c.name)+'\" placeholder=\"Nombre de la categoría\" aria-label=\"Nombre\">'\n        +'<button class=\"rm\" data-act=\"del\" title=\"Eliminar categoría\">×<\u002Fbutton>'\n        +'<\u002Fdiv>'\n        +'<div class=\"swatches\">'+sw+'<\u002Fdiv>'\n        +'<\u002Fdiv>';\n    }).join('');\n    wireCatModal();\n  }\n\n  function countEntries(id){\n    var n=0; Object.keys(data).forEach(function(k){ (data[k]||[]).forEach(function(e){ if(e.cat===id) n++; }); }); return n;\n  }\n\n  function wireCatModal(){\n    document.querySelectorAll('#catList .catedit').forEach(function(rowEl){\n      var id=rowEl.getAttribute('data-id');\n      var nameIn=rowEl.querySelector('[data-act=\"name\"]');\n      var iconIn=rowEl.querySelector('[data-act=\"icon\"]');\n      if(nameIn) nameIn.addEventListener('input', function(){ var c=getCatRef(id); if(c){ c.name=nameIn.value; saveCats(); } });\n      if(iconIn) iconIn.addEventListener('input', function(){ var c=getCatRef(id); if(c){ c.icon=iconIn.value.trim()||'•'; saveCats(); } });\n      rowEl.querySelectorAll('.swatch').forEach(function(s){\n        s.addEventListener('click', function(){\n          var c=getCatRef(id); if(!c) return;\n          c.color=s.getAttribute('data-color'); saveCats();\n          rowEl.querySelectorAll('.swatch').forEach(function(x){ x.classList.remove('on'); });\n          s.classList.add('on');\n        });\n      });\n      var del=rowEl.querySelector('[data-act=\"del\"]');\n      if(del) del.addEventListener('click', function(){\n        if(cats.length<=1){ toast('Necesitas al menos una categoría'); return; }\n        pendingDelete=id; renderCatModal();\n      });\n      var cd=rowEl.querySelector('[data-act=\"confirmDel\"]');\n      if(cd) cd.addEventListener('click', function(){ deleteCat(id); });\n      var cc=rowEl.querySelector('[data-act=\"cancelDel\"]');\n      if(cc) cc.addEventListener('click', function(){ pendingDelete=null; renderCatModal(); });\n    });\n  }\n  function getCatRef(id){ for(var i=0;i<cats.length;i++) if(cats[i].id===id) return cats[i]; return null; }\n\n  function deleteCat(id){\n    if(cats.length<=1){ toast('Necesitas al menos una categoría'); return; }\n    var fallback = cats.filter(function(c){return c.id!==id;})[0].id;\n    var used=0;\n    Object.keys(data).forEach(function(k){ (data[k]||[]).forEach(function(e){ if(e.cat===id){ e.cat=fallback; used++; } }); });\n    cats = cats.filter(function(c){ return c.id!==id; });\n    if(addCat===id) addCat=cats[0].id;\n    pendingDelete=null;\n    save(); saveCats(); renderCatModal();\n    toast(used ? used+' registro(s) movidos a «'+getCat(fallback).name+'»' : 'Categoría eliminada');\n  }\n\n  function addCategory(){\n    var c={ id:uid(), name:'', icon:'•', color:nextColor() };\n    cats.push(c); saveCats(); renderCatModal();\n    var box=document.getElementById('catList');\n    var rows=box.querySelectorAll('.catedit');\n    var last=rows[rows.length-1];\n    if(last){ var ni=last.querySelector('[data-act=\"name\"]'); if(ni){ ni.focus(); } last.scrollIntoView({block:'nearest'}); }\n  }\n\n  /* ===================== REPORTS ===================== */\n  function rangeKeys(fromK,toK){\n    var out=[], a=parseKey(fromK), b=parseKey(toK);\n    if(a>b){ var t=a; a=b; b=t; }\n    for(var d=new Date(a); d<=b; d.setDate(d.getDate()+1)) out.push(keyOf(d));\n    return out;\n  }\n\n  function renderRepCats(){\n    var el=document.getElementById('repCats');\n    el.innerHTML = cats.map(function(c){\n      var col=pal(c.color);\n      return '<label class=\"catpick on\" data-c=\"'+c.id+'\" style=\"--cs:'+col.s+';--ct:'+col.t+';--cd:'+col.d+'\">'\n        +'<span class=\"cb\">✓<\u002Fspan><span class=\"em\">'+escapeHtml(c.icon)+'<\u002Fspan>'+escapeHtml(c.name)+'<\u002Flabel>';\n    }).join('');\n  }\n  function activeCats(){\n    return Array.prototype.map.call(document.querySelectorAll('#repCats .catpick.on'), function(p){ return p.getAttribute('data-c'); });\n  }\n  function activeReports(){\n    return Array.prototype.map.call(document.querySelectorAll('#repPicks .pick.on'), function(p){ return p.getAttribute('data-r'); });\n  }\n  function incSet(ids){ var o={}; ids.forEach(function(id){ o[id]=1; }); return o; }\n\n  function computeStats(fromK,toK,inc){\n    var keys=rangeKeys(fromK,toK);\n    var allGaps=[], firstTimes=[], lastTimes=[], longestFast={mins:0,info:''}, dayWise=[];\n    var totalEntries=0, daysWith=0;\n    var countsByCat={}, listByCat={};\n    var prevLast=null, prevKey=null;\n    keys.forEach(function(k){\n      var incl=entriesFor(k).filter(function(e){ return inc[e.cat]; });\n      if(incl.length) daysWith++;\n      totalEntries+=incl.length;\n      incl.forEach(function(e){\n        countsByCat[e.cat]=(countsByCat[e.cat]||0)+1;\n        if(!listByCat[e.cat]) listByCat[e.cat]=[];\n        listByCat[e.cat].push({date:k,time:e.time,text:e.text});\n      });\n      var times=incl.map(function(e){return minOf(e.time);}).sort(function(a,b){return a-b;});\n      for(var i=1;i<times.length;i++) allGaps.push(times[i]-times[i-1]);\n      if(times.length){\n        firstTimes.push(times[0]); lastTimes.push(times[times.length-1]);\n        if(prevLast!==null){\n          var fast=(24*60-prevLast)+times[0];\n          if(fast>longestFast.mins){ longestFast={mins:fast, info:'noche '+dayLabelShort(parseKey(prevKey))+' → '+dayLabelShort(parseKey(k))}; }\n        }\n        prevLast=times[times.length-1]; prevKey=k;\n      }\n      if(times.length>1) dayWise.push({key:k, win:times[times.length-1]-times[0]});\n    });\n    var maxIntra = allGaps.length ? Math.max.apply(null,allGaps) : 0;\n    if(maxIntra>longestFast.mins){ longestFast={mins:maxIntra, info:'durante el día'}; }\n    var avgGap = allGaps.length ? Math.round(allGaps.reduce(function(a,b){return a+b;},0)/allGaps.length) : 0;\n    var minGap = allGaps.length ? Math.min.apply(null,allGaps) : 0;\n    var avgWin = dayWise.length ? Math.round(dayWise.reduce(function(a,b){return a+b.win;},0)/dayWise.length) : 0;\n    var avgFirst = firstTimes.length ? Math.round(avg(firstTimes)) : null;\n    var avgLast = lastTimes.length ? Math.round(avg(lastTimes)) : null;\n    var firstSd = firstTimes.length>1 ? Math.round(stddev(firstTimes)) : 0;\n    var lastSd = lastTimes.length>1 ? Math.round(stddev(lastTimes)) : 0;\n    return {keys:keys, daysWith:daysWith, totalEntries:totalEntries, countsByCat:countsByCat, listByCat:listByCat,\n            avgGap:avgGap, minGap:minGap, maxGap:maxIntra, longestFast:longestFast,\n            avgWin:avgWin, avgFirst:avgFirst, avgLast:avgLast, firstSd:firstSd, lastSd:lastSd, gapsN:allGaps.length};\n  }\n  function avg(a){ return a.reduce(function(x,y){return x+y;},0)/a.length; }\n  function stddev(a){ var m=avg(a); return Math.sqrt(avg(a.map(function(x){return (x-m)*(x-m);}))); }\n  function hm(mins){ if(mins==null) return '—'; mins=Math.round(mins); var h=Math.floor(mins/60)%24, mm=mins%60; return pad(h)+':'+pad(mm); }\n\n  function generate(){\n    var from=document.getElementById('repFrom').value, to=document.getElementById('repTo').value;\n    if(!from||!to){ toast('Elige un rango de fechas'); return; }\n    var incIds=activeCats();\n    if(!incIds.length){ toast('Selecciona al menos una categoría'); return; }\n    var picks=activeReports();\n    if(!picks.length){ toast('Selecciona al menos una sección'); return; }\n    var inc=incSet(incIds);\n    var s=computeStats(from,to,inc);\n    var catNames = incIds.map(function(id){ return getCat(id).icon+' '+getCat(id).name; }).join(', ');\n    var rangeTxt = dayLabelShort(parseKey(from))+'  —  '+dayLabelShort(parseKey(to))+'  ·  '+s.totalEntries+' registros en '+s.daysWith+' día(s)';\n    var out='<div class=\"report-block no-print\" style=\"margin-bottom:18px\"><div class=\"desc\">Rango: <b style=\"color:var(--ink)\">'+rangeTxt+'<\u002Fb><br>Categorías: <b style=\"color:var(--ink)\">'+escapeHtml(catNames)+'<\u002Fb><\u002Fdiv><\u002Fdiv>';\n\n    if(s.totalEntries===0){\n      document.getElementById('repOut').innerHTML='<div class=\"hint\">No hay registros de las categorías elegidas en este rango. Prueba otro periodo o incluye más categorías.<\u002Fdiv>';\n      return;\n    }\n    if(picks.indexOf('intervals')>-1) out+=blockIntervals(s);\n    if(picks.indexOf('schedule')>-1) out+=blockSchedule(s);\n    if(picks.indexOf('log')>-1) out+=blockLog(from,to,inc);\n    if(picks.indexOf('consult')>-1) out+=blockConsult(s,from,to,incIds);\n    document.getElementById('repOut').innerHTML=out;\n  }\n\n  function blockIntervals(s){\n    return '<div class=\"report-block\"><h3><span class=\"ic\">⏱<\u002Fspan>Estadísticas de intervalos<\u002Fh3>'\n      +'<p class=\"desc\">Tiempo entre registros consecutivos de las categorías elegidas. La pausa más larga incluye la pausa nocturna entre días.<\u002Fp>'\n      +'<div class=\"statgrid\">'\n      +sb('Intervalo medio', s.gapsN?fmtGap(s.avgGap):'—', s.gapsN+' intervalos')\n      +sb('Pausa más corta', s.gapsN?fmtGap(s.minGap):'—','')\n      +sb('Pausa más larga', s.longestFast.mins?fmtGap(s.longestFast.mins):'—', s.longestFast.info)\n      +sb('Ventana diaria', s.avgWin?fmtGap(s.avgWin):'—','1º → último registro (media diaria)')\n      +'<\u002Fdiv><\u002Fdiv>';\n  }\n  function blockSchedule(s){\n    var reg = s.firstSd<45?'muy regular': s.firstSd<90?'bastante regular':'variable';\n    return '<div class=\"report-block\"><h3><span class=\"ic\">🕗<\u002Fspan>Regularidad de horarios<\u002Fh3>'\n      +'<p class=\"desc\">A qué hora sueles empezar y terminar de registrar en el día, y qué tan constante eres.<\u002Fp>'\n      +'<div class=\"statgrid\">'\n      +sb('1º registro (media)', hm(s.avgFirst), s.firstSd?'± '+fmtGapShort(s.firstSd)+' de variación':'')\n      +sb('Último registro (media)', hm(s.avgLast), s.lastSd?'± '+fmtGapShort(s.lastSd)+' de variación':'')\n      +sb('Constancia del inicio', titleCase(reg), 'según variación del 1º registro')\n      +'<\u002Fdiv><\u002Fdiv>';\n  }\n  function blockLog(from,to,inc){\n    var html='<div class=\"report-block\"><h3><span class=\"ic\">🗒<\u002Fspan>Bitácora cronológica<\u002Fh3>'\n      +'<p class=\"desc\">Todo lo registrado en el rango, día por día.<\u002Fp>';\n    html+='<table class=\"tbl\">';\n    var lastKey=null, lastByCat={};\n    rangeKeys(from,to).forEach(function(k){\n      entriesFor(k).forEach(function(e){\n        if(!inc[e.cat]) return;\n        if(k!==lastKey){\n          lastKey=k; lastByCat={};\n          html+='<tr><td colspan=\"4\" class=\"daygroup\">'+dayLabel(parseKey(k))+'<\u002Ftd><\u002Ftr>'\n            +'<tr><th>Hora<\u002Fth><th>Categoría<\u002Fth><th>Registro<\u002Fth><th>Desde el anterior<\u002Fth><\u002Ftr>';\n        }\n        var c=getCat(e.cat), col=pal(c.color);\n        var gap='';\n        if(lastByCat[e.cat]!=null) gap=fmtGap(minOf(e.time)-lastByCat[e.cat]);\n        lastByCat[e.cat]=minOf(e.time);\n        html+='<tr><td class=\"t\">'+e.time+'<\u002Ftd>'\n          +'<td><span class=\"tag\" style=\"background:'+col.t+';color:'+col.d+'\"><span>'+escapeHtml(c.icon)+'<\u002Fspan>'+escapeHtml(c.name)+'<\u002Fspan><\u002Ftd>'\n          +'<td class=\"tx\">'+escapeHtml(e.text)+'<\u002Ftd>'\n          +'<td class=\"t\" style=\"color:var(--ink-3)\">'+gap+'<\u002Ftd><\u002Ftr>';\n      });\n    });\n    html+='<\u002Ftable><\u002Fdiv>';\n    return html;\n  }\n  function blockConsult(s,from,to,incIds){\n    var counts = incIds.map(function(id){\n      var c=getCat(id);\n      return '<li>'+escapeHtml(c.icon)+' '+escapeHtml(c.name)+': <b>'+(s.countsByCat[id]||0)+'<\u002Fb><\u002Fli>';\n    }).join('');\n    var lists = incIds.map(function(id){\n      var arr=s.listByCat[id]||[]; if(!arr.length) return '';\n      var c=getCat(id);\n      return '<div class=\"seclabel\">'+escapeHtml(c.icon)+' '+escapeHtml(c.name)+'<\u002Fdiv><ul>'\n        + arr.map(function(x){ return '<li><b>'+dayLabelShort(parseKey(x.date))+', '+x.time+'<\u002Fb> — '+escapeHtml(x.text)+'<\u002Fli>'; }).join('')\n        + '<\u002Ful>';\n    }).join('');\n    return '<div class=\"report-block\"><h3><span class=\"ic\">🩺<\u002Fspan>Resumen para consulta<\u002Fh3>'\n      +'<p class=\"desc\">Hoja lista para imprimir o llevar al profesional de salud.<\u002Fp>'\n      +'<div class=\"summary-card\">'\n      +'<div class=\"hd\">Resumen de seguimiento<\u002Fdiv>'\n      +'<div class=\"rng\">Periodo: '+dayLabel(parseKey(from))+' – '+dayLabel(parseKey(to))+'<\u002Fdiv>'\n      +'<div class=\"seclabel\">Actividad<\u002Fdiv>'\n      +'<ul>'\n      +'<li>Días con registro: <b>'+s.daysWith+'<\u002Fb> · Total de registros: <b>'+s.totalEntries+'<\u002Fb><\u002Fli>'\n      +'<\u002Ful>'\n      +'<div class=\"seclabel\">Registros por categoría<\u002Fdiv><ul>'+counts+'<\u002Ful>'\n      +'<div class=\"seclabel\">Patrón temporal<\u002Fdiv>'\n      +'<ul>'\n      +'<li>Intervalo medio entre registros: <b>'+(s.gapsN?fmtGap(s.avgGap):'—')+'<\u002Fb> (entre '+(s.gapsN?fmtGap(s.minGap):'—')+' y '+(s.maxGap?fmtGap(s.maxGap):'—')+')<\u002Fli>'\n      +'<li>Pausa más larga: <b>'+(s.longestFast.mins?fmtGap(s.longestFast.mins):'—')+'<\u002Fb> '+(s.longestFast.info?'('+s.longestFast.info+')':'')+'<\u002Fli>'\n      +'<li>Horario típico: primer registro ~<b>'+hm(s.avgFirst)+'<\u002Fb>, último ~<b>'+hm(s.avgLast)+'<\u002Fb><\u002Fli>'\n      +'<li>Ventana diaria media: <b>'+(s.avgWin?fmtGap(s.avgWin):'—')+'<\u002Fb> al día<\u002Fli>'\n      +'<\u002Ful>'\n      + lists\n      +'<\u002Fdiv><\u002Fdiv>';\n  }\n  function sb(k,v,note){ return '<div class=\"statbox\"><div class=\"k\">'+k+'<\u002Fdiv><div class=\"v\">'+v+'<\u002Fdiv>'+(note?'<div class=\"note\">'+note+'<\u002Fdiv>':'')+'<\u002Fdiv>'; }\n\n  /* ---------- CSV ---------- */\n  function downloadCsv(){\n    var from=document.getElementById('repFrom').value, to=document.getElementById('repTo').value;\n    if(!from||!to){ toast('Elige un rango de fechas'); return; }\n    var incIds=activeCats();\n    if(!incIds.length){ toast('Selecciona al menos una categoría'); return; }\n    var inc=incSet(incIds);\n    var keys=rangeKeys(from,to);\n    var lines=[['fecha','dia_semana','hora','categoria','texto','minutos_desde_anterior_misma_categoria','minutos_del_dia']];\n    keys.forEach(function(k){\n      var d=parseKey(k), lastByCat={};\n      entriesFor(k).forEach(function(e){\n        if(!inc[e.cat]) return;\n        var gap='';\n        if(lastByCat[e.cat]!=null) gap=minOf(e.time)-lastByCat[e.cat];\n        lastByCat[e.cat]=minOf(e.time);\n        lines.push([k, DAYS[d.getDay()], e.time, getCat(e.cat).name, e.text, gap, minOf(e.time)]);\n      });\n    });\n    if(lines.length===1){ toast('No hay registros en este rango'); return; }\n    var csv='\\uFEFF'+lines.map(function(r){ return r.map(csvCell).join(','); }).join('\\r\\n');\n    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});\n    var a=document.createElement('a');\n    a.href=URL.createObjectURL(blob);\n    a.download='lineat_'+from+'_'+to+'.csv';\n    document.body.appendChild(a); a.click(); document.body.removeChild(a);\n    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);\n    toast('CSV descargado · '+(lines.length-1)+' filas');\n  }\n  function csvCell(v){ v=(v==null?'':String(v)); if(/[\",\\r\\n]/.test(v)){ v='\"'+v.replace(/\"/g,'\"\"')+'\"'; } return v; }\n\n  /* ---------- DATA: backup & restore ---------- */\n  function dataStats(){\n    var keys=Object.keys(data).filter(function(k){ return data[k] && data[k].length; }).sort();\n    var entries=0; keys.forEach(function(k){ entries+=data[k].length; });\n    return {days:keys.length, entries:entries, first:keys[0]||null, last:keys[keys.length-1]||null};\n  }\n  function renderData(){\n    var s=dataStats();\n    document.getElementById('dataDays').textContent=s.days;\n    document.getElementById('dataEntries').textContent=s.entries;\n    document.getElementById('dataCats').textContent=cats.length;\n    document.getElementById('dataSpan').textContent = s.first\n      ? (s.first===s.last ? dayLabelShort(parseKey(s.first)) : dayLabelShort(parseKey(s.first))+' → '+dayLabelShort(parseKey(s.last)))\n      : '—';\n    document.getElementById('dataRestorePanel').innerHTML='';\n    document.getElementById('dataImportFile').value='';\n  }\n  function exportBackup(){\n    var s=dataStats();\n    if(!s.entries && !cats.length){ toast('Aún no hay nada que respaldar'); return; }\n    var payload={ app:'lineat', version:3, exportedAt:new Date().toISOString(), days:s.days, entries:s.entries, categories:cats, data:data };\n    var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});\n    var a=document.createElement('a');\n    a.href=URL.createObjectURL(blob);\n    a.download='lineat_respaldo_'+keyOf(new Date())+'.json';\n    document.body.appendChild(a); a.click(); document.body.removeChild(a);\n    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);\n    toast('Respaldo descargado · '+s.entries+' registros');\n  }\n  function normalize(raw){\n    var src = (raw && raw.data && typeof raw.data==='object') ? raw.data : raw;\n    if(!src || typeof src!=='object') return null;\n    var clean={}, count=0;\n    Object.keys(src).forEach(function(k){\n      if(!/^\\d{4}-\\d{2}-\\d{2}$/.test(k)) return;\n      var arr=src[k]; if(!Array.isArray(arr)) return;\n      var rows=[];\n      arr.forEach(function(e){\n        if(!e || typeof e.time!=='string' || typeof e.text!=='string') return;\n        if(!/^\\d{2}:\\d{2}$/.test(e.time)) return;\n        var cat = e.cat || (e.type==='symptom'?'symptom':(e.type||'food'));\n        rows.push({ id:e.id||uid(), time:e.time, cat:String(cat), text:String(e.text) });\n        count++;\n      });\n      if(rows.length) clean[k]=rows;\n    });\n    var incCats = (raw && Array.isArray(raw.categories)) ? raw.categories.filter(function(c){ return c && c.id && c.name; }).map(function(c){\n      return { id:String(c.id), name:String(c.name), icon:(c.icon?String(c.icon):'•'), color:(PALETTE[c.color]?c.color:'slate') };\n    }) : null;\n    return {clean:clean, count:count, days:Object.keys(clean).length, cats:incCats};\n  }\n  function handleImportFile(file){\n    var panel=document.getElementById('dataRestorePanel');\n    var reader=new FileReader();\n    reader.onload=function(){\n      var parsed;\n      try{ parsed=JSON.parse(reader.result); }catch(e){\n        panel.innerHTML='<div class=\"restore err\"><div class=\"file\">⚠ Archivo no válido<\u002Fdiv><div class=\"sum\">No se pudo leer el archivo. Asegúrate de elegir un respaldo .json de lineat.<\u002Fdiv><\u002Fdiv>';\n        return;\n      }\n      var n=normalize(parsed);\n      if(!n || !n.count){\n        panel.innerHTML='<div class=\"restore err\"><div class=\"file\">⚠ Sin registros válidos<\u002Fdiv><div class=\"sum\">El archivo no contiene registros reconocibles de lineat.<\u002Fdiv><\u002Fdiv>';\n        return;\n      }\n      var when = parsed.exportedAt ? (' · creado el '+dayLabelShort(new Date(parsed.exportedAt))) : '';\n      var catTxt = (n.cats && n.cats.length) ? ' y <b>'+n.cats.length+' categoría(s)<\u002Fb>' : '';\n      panel.innerHTML=\n        '<div class=\"restore\"><div class=\"file\">'\n        +'<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><path d=\"M14 2v6h6\"/><\u002Fsvg>'\n        +escapeHtml(file.name)+'<\u002Fdiv>'\n        +'<div class=\"sum\">Contiene <b>'+n.count+' registros<\u002Fb> en <b>'+n.days+' día(s)<\u002Fb>'+catTxt+when+'.<\u002Fdiv>'\n        +'<div class=\"opts\">'\n        +'<button class=\"btn\" data-mode=\"merge\">Combinar con lo actual<\u002Fbutton>'\n        +'<button class=\"btn sym\" data-mode=\"replace\">Reemplazar todo<\u002Fbutton>'\n        +'<button class=\"btn cancel\" data-mode=\"cancel\">Cancelar<\u002Fbutton>'\n        +'<\u002Fdiv><\u002Fdiv>';\n      panel.querySelectorAll('.opts .btn').forEach(function(b){\n        b.addEventListener('click', function(){ applyRestore(b.getAttribute('data-mode'), n.clean, n.cats); });\n      });\n    };\n    reader.readAsText(file);\n  }\n  function applyRestore(mode, incoming, incomingCats){\n    if(mode==='cancel'){ renderData(); return; }\n    if(mode==='replace'){\n      data=incoming;\n      if(incomingCats && incomingCats.length) cats=incomingCats.slice();\n    } else { // merge\n      Object.keys(incoming).forEach(function(k){\n        var cur=data[k]?data[k].slice():[];\n        var seen={}; cur.forEach(function(e){ seen[e.time+'|'+e.cat+'|'+e.text]=1; });\n        incoming[k].forEach(function(e){\n          var sig=e.time+'|'+e.cat+'|'+e.text;\n          if(!seen[sig]){ cur.push(e); seen[sig]=1; }\n        });\n        data[k]=cur;\n      });\n      if(incomingCats){ incomingCats.forEach(function(ic){ if(!cats.some(function(c){return c.id===ic.id;})) cats.push(ic); }); }\n    }\n    ensureCatsExist();\n    if(!getCatExists(addCat)) addCat = cats[0] ? cats[0].id : 'food';\n    save(); saveCats();\n    renderData();\n    renderCalendar();\n    var s=dataStats();\n    toast(mode==='replace'?'Datos reemplazados · '+s.entries+' registros':'Datos combinados · '+s.entries+' registros en total');\n  }\n\n  /* ---------- toast ---------- */\n  var toastT;\n  function toast(msg){\n    var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');\n    clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); }, 2200);\n  }\n\n  /* ---------- report range defaults ---------- */\n  function setRange(fromK,toK){\n    document.getElementById('repFrom').value=fromK;\n    document.getElementById('repTo').value=toK;\n  }\n  function applyQuick(q){\n    var today=new Date(), to=keyOf(today), from;\n    if(q==='all'){\n      var ks=Object.keys(data).sort();\n      from = ks.length?ks[0]:to; to = ks.length?ks[ks.length-1]:to;\n    } else if(q==='month'){\n      from=keyOf(new Date(today.getFullYear(),today.getMonth(),1));\n    } else {\n      var d=new Date(today); d.setDate(d.getDate()-(+q-1)); from=keyOf(d);\n    }\n    setRange(from,to);\n    document.querySelectorAll('#repQuick button').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-q')===q); });\n  }\n\n  /* ===================== wire up ===================== */\n  function init(){\n    var now=new Date(); calY=now.getFullYear(); calM=now.getMonth();\n    renderCalendar();\n\n    document.getElementById('calPrev').onclick=function(){ calM--; if(calM<0){calM=11;calY--;} renderCalendar(); };\n    document.getElementById('calNext').onclick=function(){ calM++; if(calM>11){calM=0;calY++;} renderCalendar(); };\n    document.getElementById('calToday').onclick=function(){ var d=new Date(); calY=d.getFullYear(); calM=d.getMonth(); renderCalendar(); };\n\n    document.getElementById('goCalendar').onclick=function(){ renderCalendar(); show('calendar'); };\n    document.getElementById('brandHome').onclick=function(){ renderCalendar(); show('calendar'); };\n    document.getElementById('goCats').onclick=openCatModal;\n    document.getElementById('goReports').onclick=function(){ renderRepCats(); applyQuick('7'); show('reports'); };\n    document.getElementById('goData').onclick=function(){ renderData(); show('data'); };\n    document.getElementById('dataBack').onclick=function(){ renderCalendar(); show('calendar'); };\n    document.getElementById('dataExport').onclick=exportBackup;\n    document.getElementById('dataImportBtn').onclick=function(){ document.getElementById('dataImportFile').click(); };\n    document.getElementById('dataImportFile').addEventListener('change', function(){\n      if(this.files && this.files[0]) handleImportFile(this.files[0]);\n    });\n    document.getElementById('dayBack').onclick=function(){ renderCalendar(); show('calendar'); };\n    document.getElementById('repBack').onclick=function(){ renderCalendar(); show('calendar'); };\n\n    document.getElementById('dayPrev').onclick=function(){ var d=parseKey(curKey); d.setDate(d.getDate()-1); openDay(keyOf(d)); };\n    document.getElementById('dayNext').onclick=function(){ var d=parseKey(curKey); d.setDate(d.getDate()+1); openDay(keyOf(d)); };\n\n    // category modal\n    document.getElementById('catModalX').onclick=closeCatModal;\n    document.getElementById('catAdd').onclick=addCategory;\n    document.getElementById('catModal').addEventListener('click', function(ev){ if(ev.target===this) closeCatModal(); });\n    document.addEventListener('keydown', function(ev){ if(ev.key==='Escape' && document.getElementById('catModal').classList.contains('show')) closeCatModal(); });\n\n    // add bar\n    var addText=document.getElementById('addText'), addGo=document.getElementById('addGo');\n    addText.addEventListener('input', function(){ addGo.disabled = addText.value.trim()===''; });\n    addText.addEventListener('keydown', function(ev){ if(ev.key==='Enter'){ ev.preventDefault(); addEntry(); } });\n    addGo.addEventListener('click', addEntry);\n\n    // reports\n    document.getElementById('repQuick').addEventListener('click', function(ev){\n      var b=ev.target.closest('button'); if(!b) return; applyQuick(b.getAttribute('data-q'));\n    });\n    document.getElementById('repPicks').addEventListener('click', function(ev){\n      var p=ev.target.closest('.pick'); if(!p) return; p.classList.toggle('on');\n    });\n    document.getElementById('repCats').addEventListener('click', function(ev){\n      var p=ev.target.closest('.catpick'); if(!p) return; ev.preventDefault(); p.classList.toggle('on');\n    });\n    document.getElementById('repCatsAll').onclick=function(){ document.querySelectorAll('#repCats .catpick').forEach(function(p){ p.classList.add('on'); }); };\n    document.getElementById('repCatsNone').onclick=function(){ document.querySelectorAll('#repCats .catpick').forEach(function(p){ p.classList.remove('on'); }); };\n    document.getElementById('repGen').onclick=generate;\n    document.getElementById('repCsv').onclick=downloadCsv;\n    document.getElementById('repPrint').onclick=function(){ generate(); setTimeout(function(){ window.print(); }, 120); };\n\n    renderRepCats();\n    applyQuick('7');\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);\n  else init();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
